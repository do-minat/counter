<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Balance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  .counter-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .label {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    text-shadow: 0 0 12px rgba(0,0,0,0.5);
  }

  .balance-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .currency {
    font-size: 42px;
    font-weight: 900;
    color: #fff;
    text-shadow:
      0 0 20px rgba(78, 204, 163, 0.8),
      0 0 40px rgba(78, 204, 163, 0.4),
      0 2px 8px rgba(0,0,0,0.6);
    opacity: 0.85;
  }

  .amount {
    font-size: 86px;
    font-weight: 900;
    color: #fff;
    text-shadow:
      0 0 30px rgba(78, 204, 163, 0.8),
      0 0 60px rgba(78, 204, 163, 0.4),
      0 0 100px rgba(78, 204, 163, 0.2),
      0 2px 8px rgba(0,0,0,0.6);
    line-height: 1;
    transition: transform 0.15s ease;
    min-width: 120px;
    text-align: center;
  }

  .amount.bump {
    transform: scale(1.12);
  }

  /* glow pulse on change */
  .glow-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(78,204,163,0.25) 0%, transparent 70%);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .glow-ring.active {
    opacity: 1;
    animation: glowPulse 0.8s ease-out forwards;
  }

  @keyframes glowPulse {
    0%   { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.6); opacity: 0; }
  }

  /* floating +/- indicator */
  .float-indicator {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 32px;
    font-weight: 900;
    pointer-events: none;
    opacity: 0;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }

  .float-indicator.show-plus {
    color: #4ecca3;
    animation: floatUp 1.2s ease-out forwards;
  }

  .float-indicator.show-minus {
    color: #ff6b6b;
    animation: floatUp 1.2s ease-out forwards;
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-70px); }
  }

  .connecting {
    color: rgba(255,255,255,0.3);
    font-size: 16px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div class="counter-wrap" id="counterWrap">
  <div class="glow-ring" id="glowRing"></div>
  <div class="float-indicator" id="floatIndicator"></div>
  <div class="label" id="label">БАЛАНС</div>
  <div class="balance-row">
    <span class="currency" id="currencySign">₴</span>
    <span class="amount" id="amountDisplay">0</span>
  </div>
</div>

<div class="connecting" id="connecting">З'ЄДНАННЯ...</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

  // =============================================
  //  ВСТАВ СВІЙ FIREBASE CONFIG НИЖЧЕ
  // =============================================
  const firebaseConfig = {
    apiKey: "AIzaSyBkxd9zfgFBO_hworWbgJQX215QPO7cjAA",
    authDomain: "babki-4e447.firebaseapp.com",
    databaseURL: "https://babki-4e447-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "babki-4e447",
    storageBucket: "babki-4e447.firebasestorage.app",
    messagingSenderId: "873612877270",
    appId: "1:873612877270:web:55c8125ecc6a65b5e89877"
  };
  // =============================================

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const amountEl = document.getElementById('amountDisplay');
  const glowRing = document.getElementById('glowRing');
  const floatEl = document.getElementById('floatIndicator');
  const connectingEl = document.getElementById('connecting');
  const counterWrap = document.getElementById('counterWrap');
  const labelEl = document.getElementById('label');
  const currencyEl = document.getElementById('currencySign');

  let currentValue = 0;
  let firstLoad = true;

  // Read URL params for customization
  const params = new URLSearchParams(window.location.search);
  const customLabel = params.get('label');
  const customCurrency = params.get('currency');
  const customColor = params.get('color');
  const roomId = params.get('room') || 'default';

  if (customLabel) labelEl.textContent = customLabel;
  if (customCurrency) currencyEl.textContent = customCurrency;
  if (customColor) {
    document.documentElement.style.setProperty('--accent', customColor);
    const style = document.createElement('style');
    style.textContent = `
      .currency, .amount { text-shadow: 0 0 30px ${customColor}88, 0 0 60px ${customColor}44, 0 2px 8px rgba(0,0,0,0.6) !important; }
      .glow-ring { background: radial-gradient(circle, ${customColor}40 0%, transparent 70%) !important; }
      .float-indicator.show-plus { color: ${customColor} !important; }
    `;
    document.head.appendChild(style);
  }

  // Listen to Firebase
  const balanceRef = ref(db, `counters/${roomId}/balance`);

  onValue(balanceRef, (snapshot) => {
    connectingEl.style.display = 'none';
    counterWrap.style.display = 'flex';

    const newValue = snapshot.val() ?? 0;
    const diff = newValue - currentValue;

    if (!firstLoad && diff !== 0) {
      // Bump animation
      amountEl.classList.add('bump');
      setTimeout(() => amountEl.classList.remove('bump'), 150);

      // Glow
      glowRing.classList.remove('active');
      void glowRing.offsetWidth;
      glowRing.classList.add('active');

      // Float indicator
      floatEl.classList.remove('show-plus', 'show-minus');
      void floatEl.offsetWidth;
      if (diff > 0) {
        floatEl.textContent = `+${diff}`;
        floatEl.classList.add('show-plus');
      } else {
        floatEl.textContent = `${diff}`;
        floatEl.classList.add('show-minus');
      }
    }

    currentValue = newValue;
    animateValue(amountEl, newValue);
    firstLoad = false;
  });

  function animateValue(el, target) {
    const current = parseInt(el.textContent.replace(/\s/g, '')) || 0;
    if (current === target) { el.textContent = formatNumber(target); return; }

    const duration = 400;
    const start = performance.now();

    function tick(now) {
      const progress = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const val = Math.round(current + (target - current) * eased);
      el.textContent = formatNumber(val);
      if (progress < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  function formatNumber(n) {
    return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  }
</script>
</body>
</html>
